name: Kidney H5AD example

on:
  push:
    branches: [main]
    paths:
      - R/**
      - src/**
      - benchmarks/kidney_h5ad_ci.R
      - .github/workflows/kidney-h5ad-example.yaml
      - DESCRIPTION
      - NAMESPACE
  pull_request:
    paths:
      - R/**
      - src/**
      - benchmarks/kidney_h5ad_ci.R
      - .github/workflows/kidney-h5ad-example.yaml
      - DESCRIPTION
      - NAMESPACE
  workflow_dispatch:
    inputs:
      cells:
        description: Number of kidney H5AD cells to test
        required: true
        default: "1000"
      genes:
        description: Number of genes to keep
        required: true
        default: "80"
      types:
        description: Number of pseudo-reference types
        required: true
        default: "4"
      cores:
        description: Number of cores for fast RCTD
        required: true
        default: "2"

concurrency:
  group: kidney-h5ad-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kidney-h5ad:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      KIDNEY_H5AD_URL: https://ndownloader.figshare.com/files/61982293
      KIDNEY_EXAMPLE_CELLS: ${{ inputs.cells || '1000' }}
      KIDNEY_EXAMPLE_GENES: ${{ inputs.genes || '80' }}
      KIDNEY_EXAMPLE_TYPES: ${{ inputs.types || '4' }}
      KIDNEY_EXAMPLE_CORES: ${{ inputs.cores || '2' }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            dmcable/spacexr
            bioc::rhdf5
            local::.

      - name: Cache kidney H5AD
        uses: actions/cache@v4
        with:
          path: ~/.cache/spacexrfast/10x_rcc_rna.h5ad
          key: 10x-rcc-rna-h5ad-figshare-61982293-v1

      - name: Download kidney H5AD
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/spacexrfast"
          file="$HOME/.cache/spacexrfast/10x_rcc_rna.h5ad"
          if [[ ! -s "$file" ]]; then
            curl --fail --location --progress-bar "$KIDNEY_H5AD_URL" --output "$file"
          fi
          ls -lh "$file"

      - name: Run kidney H5AD parity example
        env:
          KIDNEY_H5AD: ~/.cache/spacexrfast/10x_rcc_rna.h5ad
        run: Rscript benchmarks/kidney_h5ad_ci.R
